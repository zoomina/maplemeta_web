services:
  - type: web
    name: maplemeta-web
    env: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PGHOST
        value: aws-0-us-east-1.pooler.supabase.com
      - key: PGPORT
        value: "6543"
      - key: PGDATABASE
        value: postgres
      - key: PGUSER
        value: postgres.okjrtyiucbywjhqgvxsd
      - key: PGPASSWORD
        sync: false
      - key: PGSCHEMA
        value: public
      - key: APP_NAME
        value: Maple Meta Dashboard
      - key: SELF_PING_URL
        sync: false
      - key: PATCH_NOTE_BASE_PATH
        value: 
